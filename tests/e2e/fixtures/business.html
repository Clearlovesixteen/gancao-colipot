<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>业务自动化验收页</title>
    <style>
      body { margin: 0; font: 14px/1.5 Arial, sans-serif; color: #1f2937; }
      header { height: 56px; display: flex; align-items: center; gap: 24px; padding: 0 20px; background: #eef4ff; }
      header a { color: #1257b8; cursor: pointer; }
      .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 56px); }
      aside { padding: 16px 12px; background: #f7f9fc; }
      .menu-parent, .menu-child { width: 100%; border: 0; background: transparent; padding: 10px 12px; text-align: left; cursor: pointer; }
      .menu-parent { font-weight: 600; }
      .menu-children[hidden] { display: none; }
      .menu-child { padding-left: 32px; }
      .menu-child.active { color: #1268d5; background: #dceaff; }
      main { padding: 24px; }
      .toolbar, .form { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; margin-bottom: 18px; }
      label { display: grid; gap: 5px; }
      input, select, button { min-height: 34px; padding: 5px 10px; }
      button { cursor: pointer; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px; border: 1px solid #dde3ea; text-align: left; }
      .icon-button { width: 36px; padding: 4px; }
      .status { color: #16803a; }
      .empty { padding: 80px; color: #64748b; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <strong>智慧业务系统</strong>
      <a id="file-center-link" role="link">文件中心</a>
      <span id="route-label">首页</span>
    </header>
    <div class="layout">
      <aside role="navigation" aria-label="业务菜单">
        <section data-module="颗粒剂管理">
          <button class="menu-parent" aria-expanded="false">颗粒剂管理</button>
          <div class="menu-children" hidden>
            <button class="menu-child" role="menuitem">库存预警</button>
          </div>
        </section>
        <section data-module="饮片管理">
          <button class="menu-parent" aria-expanded="false">饮片管理</button>
          <div class="menu-children" hidden>
            <button class="menu-child" role="menuitem">库存预警</button>
          </div>
        </section>
      </aside>
      <main id="main"><div class="empty">请选择左侧菜单</div></main>
    </div>
    <script src="business.js"></script>
  </body>
</html>
