  <script id="markdown-source" type="text/plain"># 甘草 Copilot 架构图

当前项目是一个 Manifest V3 Chrome 扩展。Vite 打包 4 个运行入口：

- `sidePanel.js`: 插件侧边栏，承载登录、聊天、文件上传、资料中心、OCR 和工具箱。
- `dashboard.js`: 自动化工作台，承载工作流列表、工作流编辑器、流程图和运行日志。
- `background.js`: 扩展后台模块化服务工作线程，是消息路由、AI 编排、页面工具网关、自动化执行、下载入库和资料工具中心。
- `content.js`: 注入业务页面，负责页面观察、DOM 动作执行、搜索结果提取、控制台错误采集、选中文本入口和页面登录态同步。

  end

## 模块职责

| 模块 | 职责 |
| --- | --- |
| `src/sidePanel` | 用户主入口：登录、聊天、附件解析、结构化 OCR、资料中心入口、工具箱、智能操作任务卡片。 |
| `src/dashboard` | 工作流增删改查、可视化编排、固定流程运行控制和运行日志展示。 |
| `src/background/index.ts` | 插件核心编排：运行时消息、权限、标签页控制、AI 客户端、工具路由、自动化调度、下载入库、登录态同步。 |
| `src/background/computerUse*.ts` | 智能浏览器操作子系统：意图理解、任务计划、阶段循环、规则/LLM 规划、动作校验和轨迹记录。 |
| `src/background/collectionBuilder.ts` | 从页面观察结果中整理语义集合：搜索结果、菜单组、文件列表、表格和卡片，减少规划器直接面对零散 DOM 的成本。 |
| `src/background/targetResolver.ts` | 把计划步骤中的目标解析成真实元素或坐标，优先使用集合、序号、父路径和阶段记忆，避免重复点击失败候选。 |
| `src/background/phaseCompletion.ts` | 统一判断阶段是否完成，覆盖页面导航、下载完成、数据提取、打开文件中心和点击最近下载文件等场景。 |
| `src/background/downloadManager.ts` | 真实导出/下载动作：监听 `chrome.downloads`，尝试读取下载内容，解析后保存到资料中心。 |
| `src/content` | 页面侧执行层：DOM 观察、元素语义识别、搜索结果提取、点击/双击/右键/坐标点击/快捷键等浏览器动作、页面结构化提取、控制台错误缓存、登录态读取。 |
| `src/shared` | 跨入口共享类型、业务工具声明、文件解析、文档分块、OCR 结构化、Computer Use 结果汇总、导出器。 |
| `src/sidePanel/utils/documentStore.ts` 与 `src/background/documentDb.ts` | 两套入口各自访问同一个 `gancao_document_center` IndexedDB，用于资料、内容、分块、结果和原始文件。 |
| `public` | Manifest、HTML 壳、钉钉登录脚本、页面控制台桥接脚本。 |

## 架构备注

- `background/index.ts` 仍是最核心的编排点，但 Computer Use 已经拆成“意图/计划、页面上下文、集合构建、目标解析、阶段完成判定、轨迹记录”等独立模块。
- Computer Use 现在以 `ComputerUseTaskPlan` 和 `ComputerUsePhase` 推进任务，`RunState` 记录下载结果、完成阶段和警告，`PhaseMemory` 记录失败候选，避免在同一阶段反复点错。
- `pageContextBuilder.ts` 会把 `observe_page` 结果加工成 `ObservedCollection`，规划器和目标解析器优先使用这些集合，而不是只依赖零散元素列表。
- `content/tools.ts` 现在不只是执行动作，还会给元素打上 `purpose`、`region`、`context`、`score`，并支持双击、右键、坐标点击、清空输入、聚焦和快捷键等更细的操作。
- 自动操作结果会进入内存轨迹 `computerUseTrace.ts`，侧边栏再以任务卡片形式展示、复制和重试。
- 下载文件不再只是点击按钮：`download_file` 会等待真实下载事件，并尽量把下载文件解析后写入资料中心。
- 资料中心同时接收上传文件、OCR 结构化结果、网页结构化采集和下载文件；最终统一走文档分块与检索工具。
- 当前聊天附件上下文以本地解析文本、表格和 OCR 为主；代码里仍保留大模型文件上传工具，但侧边栏当前标记为跳过原生文件上传。</script>

  <script>
    const source = document.getElementById('markdown-source').textContent.trim();
    const content = document.getElementById('content');
    let rawVisible = false;

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function toggleRaw() {
      rawVisible = !rawVisible;
      if (rawVisible) {
        content.innerHTML = `<pre class="raw-fallback">${escapeHtml(source)}</pre>`;
        return;
      }
      renderMarkdown();
    }

    function renderMarkdown() {
      if (!window.marked || !window.mermaid) {
        content.innerHTML = `<pre class="raw-fallback">${escapeHtml(source)}</pre>`;
        return;
      }

      marked.setOptions({
        gfm: true,
        breaks: false,
      });

      const renderer = new marked.Renderer();
      renderer.code = (codeOrToken, language) => {
        const code = typeof codeOrToken === 'object' && codeOrToken !== null
          ? String(codeOrToken.text || '')
          : String(codeOrToken || '');
        const lang = typeof codeOrToken === 'object' && codeOrToken !== null
          ? String(codeOrToken.lang || '')
          : String(language || '');

        if (lang.trim() === 'mermaid') {
          return `<div class="mermaid">${escapeHtml(code)}</div>`;
        }

        return `<pre><code>${escapeHtml(code)}</code></pre>`;
      };

      content.innerHTML = marked.parse(source, { renderer });
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'default',
        flowchart: {
          htmlLabels: true,
          curve: 'basis',
        },
        sequence: {
          mirrorActors: false,
        },
      });
      mermaid.run({ querySelector: '.mermaid' }).then(() => {
        enhanceDiagrams();
      }).catch((error) => {
        const diagrams = document.querySelectorAll('.mermaid');
        diagrams.forEach((diagram) => {
          diagram.innerHTML = `<pre class="raw-fallback">${escapeHtml(diagram.textContent || '')}</pre>`;
        });
        console.error('Mermaid 渲染失败:', error);
      });
    }

    function enhanceDiagrams() {
      document.querySelectorAll('.mermaid').forEach((diagram, index) => {
        const svg = diagram.querySelector('svg');
        if (!svg || diagram.dataset.enhanced === 'true') return;

        diagram.dataset.enhanced = 'true';
        diagram.dataset.zoom = '1';

        const viewBox = svg.getAttribute('viewBox');
        const viewBoxWidth = viewBox ? Number(viewBox.split(/\s+/)[2]) : 1200;
        const readableWidth = Math.max(980, Math.min(viewBoxWidth || 1200, 1800));
        svg.dataset.baseWidth = String(readableWidth);
        svg.style.width = `${readableWidth}px`;

        const toolbar = document.createElement('div');
        toolbar.className = 'diagram-toolbar';
        toolbar.innerHTML = [
          `<button type="button" data-diagram-index="${index}" data-zoom="-0.15">缩小</button>`,
          `<button type="button" data-diagram-index="${index}" data-zoom="0.15">放大</button>`,
          `<button type="button" data-diagram-index="${index}" data-reset="true">重置</button>`,
        ].join('');
        diagram.parentNode.insertBefore(toolbar, diagram);

        toolbar.addEventListener('click', (event) => {
          const button = event.target.closest('button');
          if (!button) return;
          const nextZoom = button.dataset.reset
            ? 1
            : Math.max(0.55, Math.min(2.2, Number(diagram.dataset.zoom || 1) + Number(button.dataset.zoom || 0)));
          diagram.dataset.zoom = String(nextZoom);
          svg.style.width = `${Number(svg.dataset.baseWidth || readableWidth) * nextZoom}px`;
        });
      });
    }

    renderMarkdown();
  </script>
</body>
</html>
